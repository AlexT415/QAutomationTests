name: Selenium Firefox Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Firefox
        run: choco install firefox -y

      - name: Add Firefox to PATH
        shell: powershell
        run: |
          echo "C:\Program Files\Mozilla Firefox" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH


      - name: Run tests
        run: pytest -v .github/workflows/tests_automation_actions.py